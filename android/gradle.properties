# Existing settings
org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true

# Kotlin JVM target for Java 11
kotlin.compiler.jvmTarget=11

# Suppress obsolete source/target warnings
kotlin.daemon.jvmargs=-Xlint:-options
