name: zarori_sawal
description: >
  Zaroori Sawal - Learn Skills & Play Match-3 Game!

  Master English, Computer, Digital Marketing, Web Development & YouTube 
  with structured Topic → Level → Subtopic learning. Study Mode + Test Mode 
  with MCQs, progress tracking, offline access, dark mode & avatars.

  Bonus: AI Chat Assistant for instant help, fun match-3 puzzle game with 
  fruit/emoji themes, background music, combo system & haptic feedback. 
  Learn, play & relax—all offline & free!

#publish_to: "none"
#
#version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3          # Latest stable
  cupertino_icons: ^1.0.8
  provider: ^6.1.2                    # Updated stable version
  flutter_localizations:              # For localization support
    sdk: flutter
  intl: ^0.20.0                       # Already latest
  connectivity_plus: ^7.0.0           # For Network
  hive: ^2.2.3  # --- Hive packages for offline storage ---
  hive_flutter: ^1.1.0
  http: ^1.6.0 #network
  path_provider: ^2.1.5
  screenshot: ^3.0.0                 # For capturing result screen
  share_plus: ^12.0.1               # For sharing screenshot to any platform
  image: ^4.5.2                    # For image processing to embed Play Store link
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  uuid: ^4.5.1
  permission_handler: ^12.0.1 # Storage permissions
  google_mobile_ads: ^7.0.0           # Updated for AdMob (required by Play Store)
  confetti: ^0.8.0
  image_picker: ^1.1.2               # For camera/gallery photo selection
  youtube_player_flutter: ^9.1.1    # For embedded YouTube video playback
  vibration: ^3.1.3                  # For haptic feedback on score milestones
  audioplayers: ^6.1.0              # For background music
  volume_controller: ^3.4.2         # For hardware volume button control
  file_picker: ^10.3.10             # For selecting custom audio files
  flutter_quill: ^11.0.0            # Rich text editor for Notes
  url_launcher: ^6.3.1              # For opening links safely
  webview_flutter: ^4.10.0         # For in-app HTML preview in code editor
  open_filex: ^4.7.0               # For opening HTML files in external browser (FileProvider support)
  visibility_detector: ^0.4.0+2   # Detect when widgets become visible on screen
  google_fonts: ^8.0.2            # For Urdu font support (Noto Nastaliq Urdu) - DISABLED, using local font
  # Font is now bundled locally in assets/fonts/ to avoid network issues
  flutter_screenutil: ^5.9.0       # Responsive design - screen size adaptation
  pdf: ^3.10.8                     # PDF generation for certificates
  printing: ^5.13.4                # PDF printing and sharing
 # window_manager: ^0.4.3          # [TEMP] Desktop-only, removed for release
 # permission_handler: ^11.5.0 # Storage permissions
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/avatar/
    - assets/icon/
    - assets/js_logo/             # App splash logo with fade animation
    - assets/audio/
    - assets/certificate/          # Certificate assets (logo, signature, background)
    - assets/fonts/                # Local fonts (Noto Nastaliq Urdu)
    - lib/l10n/en.json
    - lib/l10n/ur.json
  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/zs-logo.png"
  min_sdk_android: 24